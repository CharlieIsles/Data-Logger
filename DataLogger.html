<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Data Logger 2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-raised: #232733;
      --border: #2e3343;
      --text: #e8eaf0;
      --text-muted: #8b90a0;
      --accent: #4e9af5;
      --accent-dim: rgba(78, 154, 245, 0.15);
      --success: #3dd68c;
      --success-dim: rgba(61, 214, 140, 0.15);
      --danger: #f55d5d;
      --danger-dim: rgba(245, 93, 93, 0.15);
      --warning: #f5a623;
      --warning-dim: rgba(245, 166, 35, 0.15);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active {
      background: #3d87e0;
    }

    .btn-success {
      background: var(--success);
      color: #0f1117;
    }

    .btn-success:active {
      background: #2fc07a;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:active {
      background: #e04a4a;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:active {
      background: var(--surface-raised);
    }

    .btn-action {
      background: var(--success-dim);
      color: var(--success);
      border: 1px solid var(--success);
      font-weight: 600;
    }

    .btn-action:active,
    .btn-action.active {
      background: var(--success);
      color: #0f1117;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-block {
      width: 100%;
      justify-content: center;
    }

    .btn-lg {
      padding: 14px 20px;
      font-size: 16px;
      border-radius: var(--radius);
    }

    .summary-row {
      display: flex;
      gap: 8px;
      padding: 6px 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'JetBrains Mono', monospace;
    }

    .summary-tag:active {
      background: var(--surface-raised);
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .summary-card:active {
      background: var(--surface-raised);
    }

    .summary-card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-card-value {
      font-size: 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
    }

    .summary-card-value.not-set {
      color: var(--text-muted);
      font-style: italic;
      font-family: 'DM Sans', sans-serif;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .session-card:active {
      background: var(--surface-raised);
    }

    .main {
      padding: 4px 0 100px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 16px 16px 8px;
    }

    .outcome-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 0 16px;
    }

    .outcome-btn {
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      text-align: center;
      transition: all 0.15s;
    }

    .outcome-btn:active {
      transform: scale(0.98);
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 16px;
    }

    .chip {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:active {
      transform: scale(0.96);
    }

    .chip.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .modal-header {
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    .modal-body {
      padding: 16px 20px;
    }

    .modal-footer {
      padding: 12px 20px 16px;
      display: flex;
      gap: 8px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field-input:focus {
      border-color: var(--accent);
    }

    .action-bar {
      margin: 8px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .flight-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 16px 0;
      text-align: center;
    }

    .q-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin: 12px 0 6px;
    }

    .q-label:first-child {
      margin-top: 0;
    }

    .banner {
      margin: 16px;
      padding: 24px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .banner p {
      color: var(--text-muted);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .battery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .battery-grid .field {
      margin-bottom: 8px;
    }

    .cache-indicator {
      font-size: 11px;
      color: var(--success);
      padding: 0 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .gather-panel {
      margin: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .gather-panel .outcome-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .gather-panel .outcome-badge.success {
      background: var(--success-dim);
      color: var(--success);
    }

    .gather-panel .outcome-badge.failure {
      background: var(--danger-dim);
      color: var(--danger);
    }

    .gather-panel .outcome-badge.abort {
      background: var(--warning-dim);
      color: var(--warning);
    }

    /* Battery Use group */
    .battery-use-group {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 8px;
    }

    .battery-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .battery-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      min-width: 48px;
      text-align: center;
    }

    .battery-slider-control {
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px 12px;
      flex: 1;
    }

    .battery-slider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .battery-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .battery-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    .battery-slider::-moz-range-thumb {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    .battery-last-flight {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Attention state — pulsing amber border */
    @keyframes battery-pulse {
      0%, 100% { border-color: var(--warning); box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.5); }
      50%       { border-color: var(--warning); box-shadow: 0 0 0 5px rgba(245, 166, 35, 0); }
    }

    .battery-needs-attention {
      border-color: var(--warning) !important;
      animation: battery-pulse 2s ease-in-out infinite;
    }

    /* Warning button style (for Landing) */
    .btn-warning {
      background: var(--warning);
      color: #0f1117;
    }
    .btn-warning:active {
      filter: brightness(0.9);
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const CONFIG = {
      flightStages: [
        { id: "pre_takeoff", label: "Pre-takeoff checks", order: 1, airborne: false },
        { id: "localisation", label: "Localisation", order: 2, airborne: true },
        { id: "flight", label: "Flight", order: 3, airborne: true }
      ],

      systemFailureReasons: {
        pre_takeoff: [
          { id: "gimbal_tilt", label: "Gimbal tilt", order: 1 },
          { id: "no_ground_view", label: "Unable to identify wheels", order: 2 },
          { id: "no_battery_visible", label: "Battery not visible & no Fly button", order: 3 },
          { id: "other", label: "Other", order: 99 }
        ],
        localisation: [
          { id: "no_vehicle", label: "Couldn't find vehicle", order: 1 },
          { id: "position_fail", label: "Unable to centre drone", order: 2 },
          { id: "other", label: "Other", order: 99 }
        ],
        flight: [
          { id: "auto_pause", label: "Auto-pause", order: 1 },
          { id: "unexpected_landing", label: "Unexpected landing", order: 2 },
          { id: "battery_critical", label: "Low battery", order: 3 },
          { id: "proximity_alert", label: "Proximity alert", order: 4 },
          { id: "lost_connection", label: "Tablet lost connection with drone", order: 5 },
          { id: "other", label: "Other", order: 99 }
        ]
      },

      operatorAbortReasons: {
        pre_takeoff: [
          { id: "unintentional_flight", label: "Unintentional flight", order: 1 },
          { id: "gimbal_tilt", label: "Gimbal tilt", order: 2 },
          { id: "other", label: "Other", order: 99 }
        ],
        localisation: [
          { id: "taking_too_long", label: "Taking too long", order: 1 },
          { id: "bad_localisation", label: "Bad localisation", order: 2 },
          { id: "unintentional_flight", label: "Unintentional flight", order: 3 },

          { id: "other", label: "Other", order: 99 }
        ],
        flight: [
          { id: "proximity_static", label: "Flew too close to something static, e.g. car, wall.", order: 1 },
          { id: "proximity_dynamic", label: "Someone too close to drone ", order: 2 },
          { id: "drift", label: "Too much drift", order: 3 },
          { id: "other", label: "Other", order: 99 }
        ]
      },

      postFlightQuestions: [
        {
          id: "landing_quality",
          label: "How was the landing?",
          type: "enum",
          options: [
            { id: "clean", label: "Clean" },
            { id: "one_bounce", label: "1 bounce" },
            { id: "multi_bounce", label: "More than 1 bounce" }
          ]
        }
      ],

      betweenFlightActions: [
        { id: "change_battery", label: "Change battery", order: 1 },
        { id: "cycle_drone", label: "Cycle drone power", order: 2 },
        { id: "force_close", label: "Force close app", order: 3 },
        // { id: "other", label: "Other action", order: 99 }
      ],

      sessionTypes: [
        {
          id: "localisation_testing",
          label: "Localisation Testing",
          fields: [
            { id: "position", label: "Position", type: "enum", options: ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B", "C", "D"] },
            { id: "yaw", label: "Yaw (deg)", type: "enum", options: ["-15", "-10", "-5", "0", "5", "10", "15"] }
          ]
        },
        {
          id: "flight_plan_test",
          label: "Flight Plan Test",
          fields: []
        },
        {
          id: "drift_testing",
          label: "Drift Testing",
          fields: [
            { id: "arucoFlight", label: "Aruco Flight PLan", type: "enum", options: ["10", "11", "12"] }
          ]
        }
      ],

      operatorFields: [
        { id: "name", label: "Your name", type: "text" },
        { id: "tablet", label: "Tablet", type: "enum", options: ["Samsung Tab S9 Ultra", "Samsung Tab S9 FE"] }
      ],

      equipmentFields: [
        { id: "sw_version", label: "Software version", type: "enum", options: ["0.16", "0.17", "0.18", "0.19", "0.20"] },
        { id: "drone_model", label: "Drone model", type: "enum", options: ["Mk7", "Mk8", "Mk9"] },
        { id: "drone_id", label: "Drone ID", type: "text" }
      ],

      locations: ["Dunstable", "Swindon"],

      batterySlots: 4,

      vehicleColours: ["Black", "Blue", "Dark Blue", "Dark Grey", "Grey", "Red", "Silver", "White"]
    };

    // ============================================================
    // APP STATE
    // ============================================================
    let state = {
      operator: {},
      equipment: {},
      location: "",
      vehicle: {},
      vehicleCache: {},
      session: null,
      flights: [],
      currentFlight: null,
      betweenActions: [],
      sessionStore: [],   // accumulated sessions awaiting download
      batteryUse: {
        currentLevel: null,   // number 0–100, or null if unset
        levelSetAt: null,     // ISO string — for staleness check (>2 min = attention)
        airborne: false,      // true after Liftoff, false after Landing
        hasLanded: false,     // true after Landing, reset when outcome is recorded
        liftoffTime: null,    // ISO string
        liftoffLevel: null,   // number
        lastFlight: null      // { start, end, duration, liftoffTime, landingTime }
      }
    };

    // ============================================================
    // PERSISTENCE
    // ============================================================
    function loadProfile() {
      try {
        const saved = localStorage.getItem('fieldlogger_profile');
        if (saved) {
          const p = JSON.parse(saved);
          state.operator = p.operator || {};
          state.equipment = p.equipment || {};
          state.location = p.location || "";
          state.vehicle = p.vehicle || {};
        }
      } catch (e) { }
      if (!state.equipment.batteries) {
        state.equipment.batteries = Array(CONFIG.batterySlots).fill("");
      }
    }

    function persistProfile() {
      try {
        localStorage.setItem('fieldlogger_profile', JSON.stringify({
          operator: state.operator,
          equipment: state.equipment,
          location: state.location,
          vehicle: state.vehicle
        }));
      } catch (e) { }
    }

    function loadSessionCache() {
      try {
        const saved = localStorage.getItem('fieldlogger_session');
        if (saved) {
          const s = JSON.parse(saved);
          state.session = s.session || null;
          state.flights = s.flights || [];
          state.currentFlight = s.currentFlight || null;
          state.betweenActions = s.betweenActions || [];
          state.batteryUse = s.batteryUse || {
            currentLevel: null, levelSetAt: null, airborne: false,
            hasLanded: false, liftoffTime: null, liftoffLevel: null, lastFlight: null
          };
        }
      } catch (e) { }
    }

    function persistSession() {
      try {
        localStorage.setItem('fieldlogger_session', JSON.stringify({
          session: state.session,
          flights: state.flights,
          currentFlight: state.currentFlight,
          betweenActions: state.betweenActions,
          batteryUse: state.batteryUse
        }));
      } catch (e) { }
    }

    function clearSessionCache() {
      try { localStorage.removeItem('fieldlogger_session'); } catch (e) { }
    }

    function loadStore() {
      try {
        const saved = localStorage.getItem('fieldlogger_store');
        if (saved) state.sessionStore = JSON.parse(saved) || [];
      } catch (e) { state.sessionStore = []; }
    }

    function persistStore() {
      try {
        localStorage.setItem('fieldlogger_store', JSON.stringify(state.sessionStore));
      } catch (e) { }
    }

    function clearStore() {
      state.sessionStore = [];
      try { localStorage.removeItem('fieldlogger_store'); } catch (e) { }
    }

    function loadVehicleCache() {
      try {
        const saved = localStorage.getItem('fieldlogger_vehicle_cache');
        if (saved) state.vehicleCache = JSON.parse(saved) || {};
      } catch (e) { state.vehicleCache = {}; }
    }

    function persistVehicleCache() {
      try {
        localStorage.setItem('fieldlogger_vehicle_cache', JSON.stringify(state.vehicleCache));
      } catch (e) { }
    }

    function formatReg(reg) {
      return /^[A-Z]{2}[0-9]{2}[A-Z]{3}$/.test(reg) ? reg.slice(0, 4) + ' ' + reg.slice(4) : reg;
    }

    function updateVehicleSearch(input) {
      if (!state._pendingVehicle) state._pendingVehicle = {};
      state._pendingVehicle.registration = input.value;
      const pos = input.selectionStart;
      render();
      const el = document.querySelector('[data-modal-field="v-registration"]');
      if (el) { el.focus(); try { el.setSelectionRange(pos, pos); } catch (e) {} }
    }

    function hasPendingData() {
      return state.sessionStore.length > 0 || (state.session && state.flights.length > 0);
    }

    function getAvailableBatteries() {
      const bats = state.equipment.batteries || [];
      return bats.filter(b => b.trim() !== '');
    }

    function isSetupComplete() {
      const hasOperator = !!(state.operator.name);
      const hasEquipment = !!(state.equipment.drone_id && state.equipment.sw_version);
      const hasLocation = !!state.location;
      const hasVehicle = !!(state.vehicle && state.vehicle.registration);
      const hasSession = !!state.session;
      return hasOperator && hasEquipment && hasLocation && hasVehicle && hasSession;
    }

    // ============================================================
    // RENDERING
    // ============================================================
    let openModal = null;

    function render() {
      const app = document.getElementById('app');
      let body;
      if (state.session && isSetupComplete()) {
        body = renderFlightArea();
      } else if (state.session && !isSetupComplete()) {
        body = renderSetupIncomplete();
      } else {
        body = renderNoSession();
      }
      app.innerHTML = `
    ${renderTopbar()}
    <div class="main">
      ${renderContext()}
      ${body}
    </div>
    ${renderModals()}
  `;
      bindEvents();
    }

    function renderTopbar() {
      return `
    <div class="topbar">
      <h1>Data Logger 2</h1>
      <div class="topbar-actions">
        ${hasPendingData() ? `<button class="btn btn-ghost btn-sm" data-action="download">↓ Save</button>` : ''}
      </div>
    </div>
  `;
    }

    function renderContext() {
      if (state.currentFlight && state.currentFlight.outcome) return '';

      const opSet = !!state.operator.name;
      const eqSet = state.equipment.drone_model || state.equipment.drone_id;
      const locSet = state.location;
      const swSet = !!state.equipment.sw_version;
      const vehSet = !!(state.vehicle && state.vehicle.registration);

      let html = '';

      if (opSet || eqSet || locSet || swSet) {
        html += '<div class="summary-row">';
        if (opSet) {
          html += `<div class="summary-tag" data-modal="operator">${state.operator.name}</div>`;
        }
        if (eqSet) {
          const parts = [];
          if (state.equipment.drone_model) parts.push(state.equipment.drone_model);
          if (state.equipment.drone_id) parts.push(state.equipment.drone_id);
          if (parts.length) html += `<div class="summary-tag" data-modal="equipment">${parts.join(' · ')}</div>`;
        }
        if (locSet || swSet) {
          const locSwLabel = [state.location, state.equipment.sw_version ? `v${state.equipment.sw_version}` : ''].filter(Boolean).join(' · ');
          html += `<div class="summary-tag" data-modal="location-sw">${locSwLabel}</div>`;
        }
        html += '</div>';
      }

      if (!opSet) {
        html += `
      <div class="summary-card" data-modal="operator">
        <div class="summary-card-label">Operator</div>
        <div class="summary-card-value not-set">Tap to set</div>
      </div>`;
      }
      if (!eqSet) {
        html += `
      <div class="summary-card" data-modal="equipment">
        <div class="summary-card-label">Equipment</div>
        <div class="summary-card-value not-set">Tap to set</div>
      </div>`;
      }
      if (!locSet && !swSet) {
        html += `
      <div class="summary-card" data-modal="location-sw">
        <div class="summary-card-label">Location &amp; Version</div>
        <div class="summary-card-value not-set">Tap to set</div>
      </div>`;
      } else if (!locSet || !swSet) {
        const missingLabel = !locSet ? 'Location' : 'SW version';
        html += `
      <div class="summary-card" data-modal="location-sw">
        <div class="summary-card-label">${missingLabel} not set</div>
        <div class="summary-card-value not-set">Tap to update</div>
      </div>`;
      }

      const vehLabel = vehSet
        ? [formatReg(state.vehicle.registration), state.vehicle.make, state.vehicle.model].filter(Boolean).join(' · ')
        : 'Tap to set';
      html += `
      <div style="display: flex; align-items: stretch; gap: 8px; margin: 8px 16px;">
        <div class="session-card" data-modal="vehicle-reg" style="flex: 1; margin: 0;">
          <div class="summary-card-label">Vehicle</div>
          <div class="summary-card-value ${vehSet ? '' : 'not-set'}">${vehLabel}</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-action="new-vehicle" style="align-self: stretch; white-space: nowrap;">New Vehicle</button>
      </div>`;

      if (state.session) {
        const st = CONFIG.sessionTypes.find(t => t.id === state.session.type);
        const config = state.session.config || {};
        const configParts = [];
        if (st) {
          st.fields.forEach(f => {
            const val = config[f.id];
            if (val) configParts.push(`${f.label}: ${val}`);
          });
        }
        const configStr = configParts.length ? configParts.join(' · ') : 'Tap to configure';
        const hasConfig = configParts.length > 0;

        html += `
      <div style="display: flex; align-items: stretch; gap: 8px; margin: 8px 16px;">
        <div class="session-card" data-modal="session-config" style="flex: 1; margin: 0;">
          <div class="summary-card-label">Session — ${st ? st.label : state.session.type}</div>
          <div class="summary-card-value ${hasConfig ? '' : 'not-set'}">${configStr}</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-action="new-session" style="align-self: stretch; white-space: nowrap;">New Session</button>
      </div>
      <div class="cache-indicator">● ${(() => {
            const storedFlights = state.sessionStore.reduce((n, s) => n + s.flights.length, 0);
            const totalFlights = storedFlights + state.flights.length;
            const sessionCount = state.sessionStore.length + 1;
            const sessionLabel = sessionCount > 1 ? ` · ${sessionCount} sessions` : '';
            return `${totalFlights} flight${totalFlights !== 1 ? 's' : ''} cached${sessionLabel}`;
          })()}</div>
    `;
      }

      return html;
    }

    function renderNoSession() {
      const hasOperator = !!(state.operator.name);
      const hasEquipment = !!(state.equipment.drone_id && state.equipment.sw_version);
      const hasLocation = !!state.location;
      const hasVehicle = !!(state.vehicle && state.vehicle.registration);

      const missing = [];
      if (!hasOperator) missing.push('Operator');
      if (!hasEquipment) missing.push('Equipment');
      if (!hasLocation) missing.push('Location');
      if (!hasVehicle) missing.push('Vehicle');

      if (missing.length > 0) {
        return `
      <div class="banner">
        <p>Set up ${missing.join(', ')} above, then start a session.</p>
      </div>
    `;
      }

      return `
    <div class="banner">
      <p>Ready to go. Start a session to begin logging flights.</p>
      <button class="btn btn-primary btn-lg btn-block" data-action="start-new-session">Start Session</button>
    </div>
  `;
    }

    function renderSetupIncomplete() {
      const hasOperator = !!(state.operator.name);
      const hasEquipment = !!(state.equipment.drone_id && state.equipment.sw_version);
      const hasLocation = !!state.location;
      const hasVehicle = !!(state.vehicle && state.vehicle.registration);

      const missing = [];
      if (!hasOperator) missing.push('Operator');
      if (!hasEquipment) missing.push('Equipment');
      if (!hasLocation) missing.push('Location');
      if (!hasVehicle) missing.push('Vehicle');

      return `
    <div class="banner">
      <p>Session active but setup incomplete. Set ${missing.join(', ')} above to start logging flights.</p>
    </div>
  `;
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function renderBatteryUseGroup() {
      const bu = state.batteryUse;
      const stale = bu.currentLevel !== null && bu.levelSetAt &&
        (Date.now() - new Date(bu.levelSetAt).getTime()) > 2 * 60 * 1000;
      const needsAttention = bu.currentLevel === null || stale;

      const elapsed = bu.airborne && bu.liftoffTime
        ? Math.floor((Date.now() - new Date(bu.liftoffTime).getTime()) / 1000)
        : 0;
      const flightBtn = bu.airborne
        ? `<button class="btn btn-warning btn-lg btn-block" data-action="landing">Flying — ${elapsed}s</button>`
        : `<button class="btn btn-success btn-lg btn-block" data-action="liftoff"${(bu.currentLevel === null || bu.hasLanded) ? ' disabled style="opacity:0.5"' : ''}>Lift off</button>`;

      const levelDisplay = bu.currentLevel !== null ? bu.currentLevel + '%' : '—';
      const adjustDisabled = bu.currentLevel === null ? ' disabled style="opacity:0.4"' : '';

      return `
      <div class="section-label">Battery Use</div>
      <div class="battery-use-group">
        <div class="battery-slider-control ${needsAttention ? 'battery-needs-attention' : ''}">
          <div class="battery-slider-header">
            <span class="field-label" style="margin:0">Current Battery</span>
            <span class="battery-value">${levelDisplay}</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px; margin-top:10px;">
            <button class="btn btn-danger" style="flex:1; justify-content:center;" data-adjust-level="-5"${adjustDisabled}>−5</button>
            <button class="btn btn-danger" style="flex:1; justify-content:center;" data-adjust-level="-1"${adjustDisabled}>−1</button>
            <button class="btn btn-success" style="flex:1; justify-content:center;" data-adjust-level="+1"${adjustDisabled}>+1</button>
            <button class="btn btn-success" style="flex:1; justify-content:center;" data-adjust-level="+5"${adjustDisabled}>+5</button>
          </div>
        </div>
        ${bu.lastFlight ? `<div class="battery-last-flight">Last flight: ${bu.lastFlight.start}% \u2192 ${bu.lastFlight.end}% (${formatDuration(bu.lastFlight.duration)})</div>` : ''}
        ${flightBtn}
      </div>
    `;
    }

    function renderFlightArea() {
      const cf = state.currentFlight;

      if (!cf) {
        return `
      <div class="section-label">Actions</div>
      ${renderBetweenActions()}
      ${state.session && state.session.measureBattery ? renderBatteryUseGroup() : ''}
      <div class="section-label">Flight #${state.flights.length + 1} Outcome</div>
      <div class="outcome-grid">
        <button class="outcome-btn" data-new-outcome="success">✓ Success</button>
        <button class="outcome-btn" data-new-outcome="system_failure">✕ System Failure</button>
        <button class="outcome-btn" data-new-outcome="operator_abort">⊘ Operator Abort</button>
      </div>
    `;
      }

      if (cf.outcome === 'success') {
        return `
      <div class="gather-panel">
        <div class="outcome-badge success">✓ Success — Flight #${cf.number}</div>
        ${renderPostFlightQuestions()}
        <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
          <button class="btn btn-success btn-lg btn-block" data-action="finish-flight">Log Flight</button>
          <button class="btn btn-ghost btn-lg btn-block" data-action="cancel-flight">← Back</button>
        </div>
      </div>
    `;
      }

      const isFailure = cf.outcome === 'system_failure';
      const badgeClass = isFailure ? 'failure' : 'abort';
      const badgeLabel = isFailure ? '✕ System Failure' : '⊘ Operator Abort';
      const reasonsKey = isFailure ? 'systemFailureReasons' : 'operatorAbortReasons';
      const reasonLabel = isFailure ? 'What happened?' : 'Why did you abort?';

      return `
    <div class="gather-panel">
      <div class="outcome-badge ${badgeClass}">${badgeLabel} — Flight #${cf.number}</div>
      ${renderFailureFlow(reasonsKey, reasonLabel)}
      ${cf.stage && isAirborne(cf) ? renderPostFlightQuestions() : ''}
      <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
        ${cf.stage && cf.reason ? `<button class="btn btn-success btn-lg btn-block" data-action="finish-flight">Log Flight</button>` : ''}
        <button class="btn btn-ghost btn-lg btn-block" data-action="cancel-flight">← Back</button>
      </div>
    </div>
  `;
    }

    function renderFailureFlow(reasonsKey, reasonLabel) {
      const cf = state.currentFlight;
      const stages = [...CONFIG.flightStages].sort((a, b) => a.order - b.order);

      let html = `<div class="q-label">At what stage?</div><div class="chip-group">`;
      stages.forEach(s => {
        html += `<button class="chip ${cf.stage === s.id ? 'selected' : ''}" data-stage="${s.id}">${s.label}</button>`;
      });
      html += `</div>`;

      if (cf.stage) {
        const reasons = [...(CONFIG[reasonsKey][cf.stage] || [])].sort((a, b) => a.order - b.order);
        html += `<div class="q-label">${reasonLabel}</div><div class="chip-group">`;
        reasons.forEach(r => {
          html += `<button class="chip ${cf.reason === r.id ? 'selected' : ''}" data-reason="${r.id}">${r.label}</button>`;
        });
        html += `</div>`;

        if (cf.reason === 'other') {
          html += `
        <div class="field">
          <label class="field-label">Please describe</label>
          <input class="field-input" type="text" value="${cf.reasonOther || ''}" data-reason-other />
        </div>
      `;
        }
      }

      return html;
    }

    function isAirborne(cf) {
      if (cf.outcome === 'success') return true;
      if (!cf.stage) return false;
      const stage = CONFIG.flightStages.find(s => s.id === cf.stage);
      return stage ? stage.airborne : false;
    }

    function renderPostFlightQuestions() {
      const cf = state.currentFlight;
      if (!isAirborne(cf)) return '';
      return CONFIG.postFlightQuestions.map(q => {
        if (q.type === 'enum') {
          return `
        <div class="q-label">${q.label}</div>
        <div class="chip-group">
          ${q.options.map(opt => `
            <button class="chip ${cf.postFlight[q.id] === opt.id ? 'selected' : ''}" data-pf-id="${q.id}" data-pf-value="${opt.id}">${opt.label}</button>
          `).join('')}
        </div>
      `;
        }
        return '';
      }).join('');
    }

    function renderBetweenActions() {
      const actions = [...CONFIG.betweenFlightActions].sort((a, b) => a.order - b.order);
      const bats = getAvailableBatteries().filter(b => b !== state.session?.battery);
      const pendingBatChange = state._pendingBatteryChange;

      return `
    <div class="action-bar">
      ${actions.map(a => {
        const isActive = state.betweenActions.some(x => x.id === a.id);
        return `<button class="btn btn-action${isActive ? ' active' : ''}" data-between-action="${a.id}">${a.label}</button>`;
      }).join('')}
    </div>
    ${pendingBatChange && bats.length > 0 ? `
      <div style="padding: 8px 16px;">
        <div class="q-label">Which battery are you putting in?</div>
        <div class="chip-group">
          ${bats.map(b => `
            <button class="chip" data-change-battery-id="${b}">Battery ${b}</button>
          `).join('')}
          <button class="chip" data-cancel-battery-change>Cancel</button>
        </div>
      </div>
    ` : ''}
    ${state.betweenActions.length ? `
      <div style="padding: 4px 16px 12px; font-size: 12px; color: var(--text-muted);">
        Done: ${state.betweenActions.map(a => {
        const def = CONFIG.betweenFlightActions.find(x => x.id === a.id);
        let label = def ? def.label : a.id;
        if (a.id === 'change_battery' && a.newBatteryId) label += ` → ${a.newBatteryId}`;
        return label;
      }).join(', ')}
      </div>
    ` : ''}
  `;
    }

    // ============================================================
    // MODALS
    // ============================================================
    function renderModals() {
      return `
    ${renderModal('operator', 'Operator', renderFormFields(CONFIG.operatorFields, state.operator, 'op'))}
    ${renderModal('equipment', 'Equipment', renderEquipmentModal())}
    ${renderModal('vehicle-reg', 'Vehicle', renderVehicleRegModal())}
    ${renderModal('vehicle-detail', 'Vehicle Details', renderVehicleDetailModal())}
    ${renderModal('location-sw', 'Location & Version', renderLocationSwModal())}
    ${renderModal('new-session', 'New Session', renderNewSessionModal())}
    ${renderModal('battery', 'Select Battery', renderBatteryModal())}
    ${state.session ? renderModal('session-config', 'Session Config', renderSessionConfigModal()) : ''}
    ${state.session && state.session.measureBattery ? renderModal('landing-battery', 'Landing Battery', renderLandingBatteryModal()) : ''}
  `;
    }

    function renderLandingBatteryModal() {
      const maxVal = state.batteryUse.liftoffLevel !== null ? state.batteryUse.liftoffLevel : 100;
      const currentVal = state._pendingLandingLevel ?? maxVal;
      return `
    <div style="text-align:center; margin-bottom: 24px;">
      <span class="battery-value" style="font-size: 56px;">${currentVal}%</span>
      <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">liftoff: ${maxVal}%</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="btn btn-danger" style="flex:1; justify-content:center;" data-adjust-landing-level="-5">−5</button>
      <button class="btn btn-danger" style="flex:1; justify-content:center;" data-adjust-landing-level="-1">−1</button>
      <button class="btn btn-success" style="flex:1; justify-content:center;" data-adjust-landing-level="+1">+1</button>
      <button class="btn btn-success" style="flex:1; justify-content:center;" data-adjust-landing-level="+5">+5</button>
    </div>
  `;
    }

    function renderBatteryModal() {
      const bats = getAvailableBatteries();
      const levelVal = state._pendingBatteryLevel ?? 100;
      const showLevel = !!(state.session && state.session.measureBattery);
      const levelSection = showLevel ? `
      <div style="margin-top:20px;">
        <div class="q-label" style="margin-bottom:12px;">Starting battery level</div>
        <div style="text-align:center; margin-bottom:16px;">
          <span class="battery-value" id="initial-battery-display" style="font-size:48px;">${levelVal}%</span>
        </div>
        <input type="range" class="battery-slider" min="0" max="100" step="1"
          value="${levelVal}" data-modal-field="initial-battery-level"
          oninput="document.getElementById('initial-battery-display').textContent = this.value + '%'" />
      </div>
    ` : '';
      if (bats.length > 0 && !state._pendingMidSessionBatteryChange) {
        return `
      <div class="q-label">Which battery are you using?</div>
      <div class="chip-group">
        ${bats.map(b => `
          <button class="chip ${state._pendingBattery === b ? 'selected' : ''}" data-battery-option="${b}">Battery ${b}</button>
        `).join('')}
      </div>
      ${levelSection}
    `;
      }
      return `
      <div class="field">
        <label class="field-label">Battery ID</label>
        <input class="field-input" type="text" value="${state._pendingBattery || ''}" data-modal-field="battery-id" placeholder="Battery ID" />
      </div>
      ${levelSection}
    `;
    }

    function renderVehicleRegModal() {
      const reg = (state._pendingVehicle && state._pendingVehicle.registration) || '';
      const cacheKeys = Object.keys(state.vehicleCache);
      const matches = reg
        ? cacheKeys.filter(k => k.startsWith(reg))
        : cacheKeys;
      return `
        <div class="field">
          <label class="field-label">Registration</label>
          <input class="field-input" type="text" value="${reg}"
            data-modal-field="v-registration"
            oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); updateVehicleSearch(this);"
            placeholder="e.g. AB12CDE"
            autocomplete="off" autocorrect="off" spellcheck="false"
          />
        </div>
        ${matches.length > 0 ? `
          <div class="q-label">Known vehicles</div>
          <div class="chip-group">
            ${matches.map(k => {
              const cv = state.vehicleCache[k];
              const label = [formatReg(cv.registration), cv.make, cv.model].filter(Boolean).join(' · ');
              return `<button class="chip ${reg === k ? 'selected' : ''}" data-vehicle-cache-reg="${k}">${label}</button>`;
            }).join('')}
          </div>
        ` : ''}
      `;
    }

    function renderVehicleDetailModal() {
      const v = state._pendingVehicle || {};
      const numField = (id, label) => `
        <div class="field">
          <label class="field-label">${label} (cm)</label>
          <input class="field-input" type="number" inputmode="decimal" min="0" value="${v[id] !== undefined && v[id] !== '' ? v[id] : ''}" data-modal-field="v-${id}" />
        </div>
      `;
      return `
        <div style="font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; margin-bottom:16px; color:var(--text);">${formatReg(v.registration || '')}</div>
        <div class="field">
          <label class="field-label">Make</label>
          <input class="field-input" type="text" value="${v.make || ''}" data-modal-field="v-make" />
        </div>
        <div class="field">
          <label class="field-label">Model</label>
          <input class="field-input" type="text" value="${v.model || ''}" data-modal-field="v-model" />
        </div>
        <div class="q-label">Colour</div>
        <div class="chip-group">
          ${CONFIG.vehicleColours.map(c => `
            <button class="chip ${v.colour === c ? 'selected' : ''}" data-vehicle-colour="${c}">${c}</button>
          `).join('')}
        </div>
        <div class="battery-grid">
          ${numField('widthIncMirrors', 'Width inc. mirrors')}
          ${numField('widthWoMirrors', 'Width w/o mirrors')}
          ${numField('height', 'Height')}
          ${numField('length', 'Length')}
          ${numField('frontOverhang', 'Front overhang')}
        </div>
      `;
    }

    function renderModal(id, title, body) {
      return `
    <div class="modal-overlay ${openModal === id ? 'open' : ''}" data-overlay="${id}">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">${title}</div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" style="flex:1" data-close-modal="${id}">Cancel</button>
          <button class="btn btn-primary" style="flex:1" data-save-modal="${id}">Save</button>
        </div>
      </div>
    </div>
  `;
    }

    function renderFormFields(fields, data, prefix) {
      return fields.map(f => {
        const current = data[f.id] || '';
        if (f.type === 'enum') {
          const options = f.options.map(o => `<option value="${o}"${o === current ? ' selected' : ''}>${o}</option>`).join('');
          return `
    <div class="field">
      <label class="field-label">${f.label}</label>
      <select class="field-input" data-modal-field="${prefix}-${f.id}">${options}</select>
    </div>
  `;
        }
        return `
    <div class="field">
      <label class="field-label">${f.label}</label>
      <input class="field-input" type="text" value="${current}" data-modal-field="${prefix}-${f.id}" />
    </div>
  `;
      }).join('');
    }

    function renderEquipmentModal() {
      const bats = state.equipment.batteries || Array(CONFIG.batterySlots).fill("");
      let html = '';

      CONFIG.equipmentFields.filter(f => f.id !== 'sw_version').forEach(f => {
        if (f.type === 'enum') {
          html += `
        <div class="q-label">${f.label}</div>
        <div class="chip-group">
          ${f.options.map(opt => `
            <button class="chip ${state._pendingEquipment && state._pendingEquipment[f.id] === opt ? 'selected' : (!state._pendingEquipment && state.equipment[f.id] === opt ? 'selected' : '')}" data-eq-enum="${f.id}" data-eq-enum-value="${opt}">${opt}</button>
          `).join('')}
        </div>
      `;
        } else {
          html += `
        <div class="field">
          <label class="field-label">${f.label}</label>
          <input class="field-input" type="text" value="${state.equipment[f.id] || ''}" data-modal-field="eq-${f.id}" />
        </div>
      `;
        }
      });

      html += `
    <div class="field-label" style="margin-top: 8px;">Batteries</div>
    <div class="battery-grid">
      ${bats.map((b, i) => `
        <div class="field">
          <label class="field-label">Battery ID ${i + 1}</label>
          <input class="field-input" type="text" value="${b}" data-battery-slot="${i}" placeholder="" />
        </div>
      `).join('')}
    </div>
  `;

      return html;
    }

    function renderLocationSwModal() {
      const swField = CONFIG.equipmentFields.find(f => f.id === 'sw_version');
      return `
    <div class="q-label">Location</div>
    <div class="chip-group">
      ${CONFIG.locations.map(loc => `
        <button class="chip ${state._pendingLocation === loc ? 'selected' : (state.location === loc && !state._pendingLocation ? 'selected' : '')}" data-location-option="${loc}">${loc}</button>
      `).join('')}
    </div>
    <div class="q-label">Software version</div>
    <div class="chip-group">
      ${swField.options.map(opt => `
        <button class="chip ${state._pendingSwVersion === opt ? 'selected' : (state.equipment.sw_version === opt && !state._pendingSwVersion ? 'selected' : '')}" data-sw-version-option="${opt}">${opt}</button>
      `).join('')}
    </div>
  `;
    }

    function renderNewSessionModal() {
      return `
    <div class="q-label">Session type</div>
    <div class="chip-group">
      ${CONFIG.sessionTypes.map(t => `
        <button class="chip ${state._pendingSessionType === t.id ? 'selected' : ''}" data-session-type="${t.id}">${t.label}</button>
      `).join('')}
    </div>
  `;
    }

    function renderSessionConfigModal() {
      if (!state.session) return '';
      const st = CONFIG.sessionTypes.find(t => t.id === state.session.type);
      const config = state.session.config || {};

      let html = `
      <div class="q-label">Battery Measure Mode</div>
      <div class="chip-group">
        <button class="chip ${state._pendingMeasureBattery ? 'selected' : ''}" data-measure-battery="true">ON</button>
        <button class="chip ${!state._pendingMeasureBattery ? 'selected' : ''}" data-measure-battery="false">OFF</button>
      </div>
    `;

      if (st && st.fields.length) {
        st.fields.forEach(f => {
          if (f.type === 'enum') {
            html += `
          <div class="q-label">${f.label}</div>
          <div class="chip-group">
            ${f.options.map(opt => `
              <button class="chip ${config[f.id] === opt ? 'selected' : ''}" data-session-config-field="${f.id}" data-session-config-value="${opt}">${opt}</button>
            `).join('')}
          </div>
        `;
          } else {
            html += `
          <div class="field">
            <label class="field-label">${f.label}</label>
            <input class="field-input" type="text" value="${config[f.id] || ''}" data-modal-field="sc-${f.id}" />
          </div>
        `;
          }
        });
      }

      return html;
    }

    // ============================================================
    // EVENTS
    // ============================================================
    function bindEvents() {
      document.querySelectorAll('[data-modal]').forEach(el => {
        el.addEventListener('click', () => {
          openModal = el.dataset.modal;
          if (openModal === 'new-session') { state._pendingSessionType = null; state._pendingMeasureBattery = false; }
          if (openModal === 'session-config') state._pendingMeasureBattery = !!(state.session && state.session.measureBattery);
          if (openModal === 'location-sw') { state._pendingLocation = null; state._pendingSwVersion = null; }
          if (openModal === 'equipment') state._pendingEquipment = null;
          if (openModal === 'vehicle-reg') state._pendingVehicle = { registration: state.vehicle.registration || '' };
          render();
        });
      });

      document.querySelectorAll('[data-close-modal]').forEach(el => {
        el.addEventListener('click', () => {
          if (el.dataset.closeModal === 'battery' && state.session && !state.session.battery) {
            state.session = null;
            clearSessionCache();
          }
          openModal = null;
          render();
        });
      });
      document.querySelectorAll('[data-overlay]').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target === el) {
            if (el.dataset.overlay === 'battery' && state.session && !state.session.battery) {
              state.session = null;
              clearSessionCache();
            }
            openModal = null;
            render();
          }
        });
      });

      document.querySelectorAll('[data-save-modal]').forEach(el => {
        el.addEventListener('click', () => saveModal(el.dataset.saveModal));
      });

      // Equipment enum chips
      document.querySelectorAll('[data-eq-enum]').forEach(el => {
        el.addEventListener('click', () => {
          if (!state._pendingEquipment) {
            state._pendingEquipment = {};
            CONFIG.equipmentFields.forEach(f => {
              if (f.type === 'enum' && state.equipment[f.id]) state._pendingEquipment[f.id] = state.equipment[f.id];
            });
          }
          state._pendingEquipment[el.dataset.eqEnum] = el.dataset.eqEnumValue;
          render();
        });
      });

      // Session type selection — save immediately and open session config
      document.querySelectorAll('[data-session-type]').forEach(el => {
        el.addEventListener('click', () => {
          state._pendingSessionType = el.dataset.sessionType;
          render();
        });
      });

      // SW version option (location-sw modal)
      document.querySelectorAll('[data-sw-version-option]').forEach(el => {
        el.addEventListener('click', () => {
          state._pendingSwVersion = el.dataset.swVersionOption;
          render();
        });
      });

      // Location option
      document.querySelectorAll('[data-location-option]').forEach(el => {
        el.addEventListener('click', () => {
          state._pendingLocation = el.dataset.locationOption;
          render();
        });
      });

      // Session config: enum chips
      document.querySelectorAll('[data-session-config-field]').forEach(el => {
        el.addEventListener('click', () => {
          if (!state.session.config) state.session.config = {};
          state.session.config[el.dataset.sessionConfigField] = el.dataset.sessionConfigValue;
          render();
        });
      });

      // Vehicle cache suggestion chips (in reg modal)
      document.querySelectorAll('[data-vehicle-cache-reg]').forEach(el => {
        el.addEventListener('click', () => {
          const cached = state.vehicleCache[el.dataset.vehicleCacheReg];
          if (cached) {
            state._pendingVehicle = { ...cached };
            openModal = 'vehicle-detail';
            render();
          }
        });
      });

      // Vehicle colour chips
      document.querySelectorAll('[data-vehicle-colour]').forEach(el => {
        el.addEventListener('click', () => {
          if (!state._pendingVehicle) state._pendingVehicle = {};
          // Scrape current text/number fields before re-rendering so they aren't lost
          const makeEl = document.querySelector('[data-modal-field="v-make"]');
          const modelEl = document.querySelector('[data-modal-field="v-model"]');
          if (makeEl) state._pendingVehicle.make = makeEl.value;
          if (modelEl) state._pendingVehicle.model = modelEl.value;
          ['widthIncMirrors', 'widthWoMirrors', 'height', 'length', 'frontOverhang'].forEach(f => {
            const input = document.querySelector(`[data-modal-field="v-${f}"]`);
            if (input) state._pendingVehicle[f] = input.value !== '' ? Number(input.value) : '';
          });
          state._pendingVehicle.colour = el.dataset.vehicleColour;
          render();
        });
      });

      // Battery modal chips
      document.querySelectorAll('[data-battery-option]').forEach(el => {
        el.addEventListener('click', () => {
          state._pendingBattery = el.dataset.batteryOption;
          render();
        });
      });

      // Start new session button (no-session state)
      document.querySelector('[data-action="start-new-session"]')?.addEventListener('click', () => {
        openModal = 'new-session';
        state._pendingSessionType = null;
        render();
      });

      // New outcome
      document.querySelectorAll('[data-new-outcome]').forEach(el => {
        el.addEventListener('click', () => {
          state.currentFlight = {
            number: state.flights.length + 1,
            outcome: el.dataset.newOutcome,
            stage: null,
            reason: null,
            reasonOther: '',
            postFlight: {},
            actionsBefore: [...state.betweenActions]
          };
          state.betweenActions = [];
          state.batteryUse.hasLanded = false;
          persistSession();
          render();
        });
      });

      // Stage
      document.querySelectorAll('[data-stage]').forEach(el => {
        el.addEventListener('click', () => {
          state.currentFlight.stage = el.dataset.stage;
          state.currentFlight.reason = null;
          state.currentFlight.reasonOther = '';
          persistSession();
          render();
        });
      });

      // Reason
      document.querySelectorAll('[data-reason]').forEach(el => {
        el.addEventListener('click', () => {
          state.currentFlight.reason = el.dataset.reason;
          persistSession();
          render();
        });
      });

      const reasonOther = document.querySelector('[data-reason-other]');
      if (reasonOther) {
        reasonOther.addEventListener('input', (e) => {
          state.currentFlight.reasonOther = e.target.value;
          persistSession();
        });
      }

      // Post-flight questions
      document.querySelectorAll('[data-pf-id]').forEach(el => {
        el.addEventListener('click', () => {
          state.currentFlight.postFlight[el.dataset.pfId] = el.dataset.pfValue;
          persistSession();
          render();
        });
      });

      // Finish flight
      document.querySelector('[data-action="finish-flight"]')?.addEventListener('click', finishFlight);

      // Cancel flight (back button)
      document.querySelector('[data-action="cancel-flight"]')?.addEventListener('click', () => {
        state.betweenActions = state.currentFlight.actionsBefore || [];
        state.currentFlight = null;
        persistSession();
        render();
      });

      // Between-flight actions (toggleable)
      document.querySelectorAll('[data-between-action]').forEach(el => {
        el.addEventListener('click', () => {
          const actionId = el.dataset.betweenAction;
          const existingIdx = state.betweenActions.findIndex(x => x.id === actionId);
          if (existingIdx !== -1) {
            state.betweenActions.splice(existingIdx, 1);
            state._pendingBatteryChange = false;
            persistSession();
            render();
          } else if (actionId === 'change_battery' && getAvailableBatteries().length > 0) {
            state._pendingBatteryChange = true;
            render();
          } else {
            state.betweenActions.push({ id: actionId, time: new Date().toISOString() });
            if (actionId === 'change_battery') {
              state.batteryUse.currentLevel = null;
              state.batteryUse.levelSetAt = null;
            }
            persistSession();
            render();
          }
        });
      });

      document.querySelectorAll('[data-change-battery-id]').forEach(el => {
        el.addEventListener('click', () => {
          const newBatId = el.dataset.changeBatteryId;
          state._pendingBatteryChange = false;
          if (state.session && state.session.measureBattery) {
            // Need to capture level — open modal (level only, battery already known)
            state._pendingBattery = newBatId;
            state._pendingBatteryLevel = 100;
            state._pendingMidSessionBatteryChange = true;
            openModal = 'battery';
          } else {
            // Battery already chosen, no level needed — record directly
            state.betweenActions.push({ id: 'change_battery', newBatteryId: newBatId, time: new Date().toISOString() });
            state.session.battery = newBatId;
            state.batteryUse.currentLevel = null;
            state.batteryUse.levelSetAt = null;
            persistSession();
          }
          render();
        });
      });

      document.querySelector('[data-cancel-battery-change]')?.addEventListener('click', () => {
        state._pendingBatteryChange = false;
        render();
      });

      document.querySelector('[data-action="new-vehicle"]')?.addEventListener('click', () => {
        state._pendingVehicle = {};
        openModal = 'vehicle-reg';
        render();
      });

      document.querySelector('[data-action="download"]')?.addEventListener('click', downloadSession);

      document.querySelector('[data-action="new-session"]')?.addEventListener('click', () => {
        if (confirm('Start a new session? Current session will be added to the download queue.')) {
          // Archive current session to the store if it has any completed flights
          if (state.session && state.flights.length > 0) {
            state.sessionStore.push({ session: { ...state.session }, flights: [...state.flights], vehicle: { ...state.vehicle } });
            persistStore();
          }
          state.session = null;
          state.flights = [];
          state.currentFlight = null;
          state.betweenActions = [];
          clearSessionCache();
          openModal = 'new-session';
          state._pendingSessionType = null;
          render();
        }
      });

      // Battery Measure Mode ON/OFF chips (in session modals)
      document.querySelectorAll('[data-measure-battery]').forEach(el => {
        el.addEventListener('click', () => {
          state._pendingMeasureBattery = el.dataset.measureBattery === 'true';
          render();
        });
      });

      // Battery Use handlers — any slider change commits the value
      document.querySelectorAll('[data-adjust-level]').forEach(el => {
        el.addEventListener('click', () => {
          if (state.batteryUse.currentLevel === null) return;
          const delta = parseInt(el.dataset.adjustLevel, 10);
          state.batteryUse.currentLevel = Math.max(0, Math.min(100, state.batteryUse.currentLevel + delta));
          state.batteryUse.levelSetAt = new Date().toISOString();
          persistSession();
          render();
        });
      });

      document.querySelector('[data-action="liftoff"]')?.addEventListener('click', () => {
        if (state.batteryUse.currentLevel === null) return;
        state.batteryUse.airborne = true;
        state.batteryUse.liftoffTime = new Date().toISOString();
        state.batteryUse.liftoffLevel = state.batteryUse.currentLevel;
        persistSession();
        render();
      });

      document.querySelector('[data-action="landing"]')?.addEventListener('click', () => {
        const maxVal = state.batteryUse.liftoffLevel ?? 100;
        const elapsedMinutes = state.batteryUse.liftoffTime
          ? (Date.now() - new Date(state.batteryUse.liftoffTime).getTime()) / 60000
          : 0;
        state._pendingLandingLevel = Math.max(0, Math.round(maxVal - elapsedMinutes * 5));
        openModal = 'landing-battery';
        render();
      });

      document.querySelectorAll('[data-adjust-landing-level]').forEach(el => {
        el.addEventListener('click', () => {
          const delta = parseInt(el.dataset.adjustLandingLevel, 10);
          const maxVal = state.batteryUse.liftoffLevel ?? 100;
          state._pendingLandingLevel = Math.max(0, Math.min(maxVal, (state._pendingLandingLevel ?? maxVal) + delta));
          render();
        });
      });
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function saveModal(id) {
      if (id === 'operator') {
        CONFIG.operatorFields.forEach(f => {
          const input = document.querySelector(`[data-modal-field="op-${f.id}"]`);
          if (input) state.operator[f.id] = input.value;
        });
        persistProfile();
      } else if (id === 'location-sw') {
        if (state._pendingLocation) state.location = state._pendingLocation;
        if (state._pendingSwVersion) state.equipment.sw_version = state._pendingSwVersion;
        persistProfile();
      } else if (id === 'equipment') {
        CONFIG.equipmentFields.filter(f => f.id !== 'sw_version').forEach(f => {
          if (f.type === 'enum') {
            if (state._pendingEquipment && state._pendingEquipment[f.id]) {
              state.equipment[f.id] = state._pendingEquipment[f.id];
            }
          } else {
            const input = document.querySelector(`[data-modal-field="eq-${f.id}"]`);
            if (input) state.equipment[f.id] = input.value;
          }
        });
        const bats = [];
        for (let i = 0; i < CONFIG.batterySlots; i++) {
          const input = document.querySelector(`[data-battery-slot="${i}"]`);
          bats.push(input ? input.value.trim() : '');
        }
        state.equipment.batteries = bats;
        persistProfile();
      } else if (id === 'new-session') {
        if (state._pendingSessionType) {
          const measureBattery = !!state._pendingMeasureBattery;
          state.session = {
            type: state._pendingSessionType,
            startTime: new Date().toISOString(),
            config: {},
            battery: '',
            measureBattery
          };
          state.flights = [];
          state.currentFlight = null;
          state.betweenActions = [];
          state.batteryUse = {
            currentLevel: null, levelSetAt: null, airborne: false,
            hasLanded: false, liftoffTime: null, liftoffLevel: null, lastFlight: null
          };
          persistSession();
          state._pendingMeasureBattery = !!state.session.measureBattery;
          openModal = 'session-config';
          render();
          return;
        }
      } else if (id === 'session-config') {
        const st = CONFIG.sessionTypes.find(t => t.id === state.session.type);
        if (st) {
          st.fields.forEach(f => {
            if (f.type === 'text') {
              const input = document.querySelector(`[data-modal-field="sc-${f.id}"]`);
              if (input) {
                if (!state.session.config) state.session.config = {};
                state.session.config[f.id] = input.value;
              }
            }
          });
        }
        state.session.measureBattery = !!state._pendingMeasureBattery;
        if (state.flights.length > 0) {
          state.sessionStore.push({ session: { ...state.session }, flights: [...state.flights], vehicle: { ...state.vehicle } });
          persistStore();
          state.session = {
            type: state.session.type,
            startTime: new Date().toISOString(),
            config: { ...state.session.config },
            battery: state.session.battery,
            measureBattery: state.session.measureBattery
          };
          state.flights = [];
          state.currentFlight = null;
          state.betweenActions = [];
        }
        persistSession();
        if (!state.session.battery) {
          state._pendingBattery = '';
          state._pendingBatteryLevel = 100;
          openModal = 'battery';
        } else {
          openModal = null;
        }
        render();
        return;
      } else if (id === 'battery') {
        const batInput = document.querySelector('[data-modal-field="battery-id"]');
        const batVal = batInput ? batInput.value.trim() : state._pendingBattery;
        if (!batVal) return; // battery is required — stay on modal
        const levelInput = document.querySelector('[data-modal-field="initial-battery-level"]');
        const initialLevel = levelInput ? parseInt(levelInput.value, 10) : (state._pendingBatteryLevel ?? 100);
        if (state._pendingMidSessionBatteryChange) {
          state.betweenActions.push({
            id: 'change_battery',
            newBatteryId: batVal,
            time: new Date().toISOString()
          });
          state._pendingMidSessionBatteryChange = false;
        }
        state.session.battery = batVal;
        if (state.session && state.session.measureBattery) {
          state.batteryUse.currentLevel = initialLevel;
          state.batteryUse.levelSetAt = new Date().toISOString();
        }
        persistSession();
      } else if (id === 'landing-battery') {
        const level = state._pendingLandingLevel;
        if (level === null || level === undefined) return; // stay on modal
        const landingTime = new Date().toISOString();
        const duration = Math.round((new Date(landingTime) - new Date(state.batteryUse.liftoffTime)) / 1000);
        state.batteryUse.lastFlight = {
          start: state.batteryUse.liftoffLevel,
          end: level,
          duration,
          liftoffTime: state.batteryUse.liftoffTime,
          landingTime
        };
        state.batteryUse.currentLevel = level;
        state.batteryUse.levelSetAt = landingTime;
        state.batteryUse.airborne = false;
        state.batteryUse.hasLanded = true;
        state.batteryUse.liftoffTime = null;
        state.batteryUse.liftoffLevel = null;
        persistSession();
      } else if (id === 'vehicle-reg') {
        const regInput = document.querySelector('[data-modal-field="v-registration"]');
        const reg = (regInput ? regInput.value : '').toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (!reg) return;
        const cached = state.vehicleCache[reg];
        state._pendingVehicle = cached ? { ...cached } : { registration: reg };
        state._pendingVehicle.registration = reg;
        openModal = 'vehicle-detail';
        render();
        return;
      } else if (id === 'vehicle-detail') {
        if (!state._pendingVehicle || !state._pendingVehicle.registration) return;
        const makeInput = document.querySelector('[data-modal-field="v-make"]');
        const modelInput = document.querySelector('[data-modal-field="v-model"]');
        if (makeInput) state._pendingVehicle.make = makeInput.value;
        if (modelInput) state._pendingVehicle.model = modelInput.value;
        ['widthIncMirrors', 'widthWoMirrors', 'height', 'length', 'frontOverhang'].forEach(f => {
          const input = document.querySelector(`[data-modal-field="v-${f}"]`);
          if (input) state._pendingVehicle[f] = input.value !== '' ? Number(input.value) : '';
        });
        state.vehicle = { ...state._pendingVehicle };
        state.vehicleCache[state.vehicle.registration] = { ...state.vehicle };
        persistVehicleCache();
        persistProfile();
      }
      openModal = null;
      render();
    }

    function finishFlight() {
      const cf = state.currentFlight;
      cf.endTime = new Date().toISOString();

      // Snapshot session config into flight (for self-contained flight records)
      cf.sessionConfig = { ...(state.session.config || {}) };
      cf.battery = state.session.battery || '';

      // Attach battery flight data if available
      if (state.session.measureBattery && state.batteryUse.lastFlight) {
        cf.batteryFlight = { ...state.batteryUse.lastFlight };
        state.batteryUse.lastFlight = null;
      }

      state.flights.push({ ...cf });
      state.currentFlight = null;
      persistSession();
      render();
    }

    function downloadSession() {
      // Gather all sessions: archived store + current active session (if it has flights)
      const sessionsToExport = [...state.sessionStore];
      if (state.session && state.flights.length > 0) {
        sessionsToExport.push({ session: { ...state.session }, flights: [...state.flights], vehicle: { ...state.vehicle } });
      }
      if (sessionsToExport.length === 0) return;

      const now = new Date();
      const data = {
        exportedAt: now.toISOString(),
        sessions: sessionsToExport.map(({ session, flights, vehicle: v }) => ({
          type: session.type,
          startTime: session.startTime,
          operator: { ...state.operator },
          equipment: {
            sw_version: state.equipment.sw_version || '',
            drone_model: state.equipment.drone_model || '',
            drone_id: state.equipment.drone_id || ''
          },
          location: state.location,
          vehicle: v || {},
          config: session.config || {},
          // battery: session.battery || '',
          flights: flights.map(f => ({
            number: f.number,
            endTime: f.endTime,
            sessionConfig: f.sessionConfig,
            battery: f.battery,
            actionsBefore: f.actionsBefore,
            outcome: f.outcome,
            stage: f.stage || null,
            reason: f.reason || null,
            reasonOther: f.reasonOther || null,
            postFlight: f.postFlight || {},
            batteryFlight: f.batteryFlight || null
          }))
        }))
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const dateStr = now.toISOString().slice(0, 10);
      const timeStr = now.toISOString().slice(11, 16).replace(':', '');
      a.download = `fieldlog_${dateStr}_${timeStr}.json`;
      a.click();
      URL.revokeObjectURL(url);

      // Clear the store — these flights are now exported
      clearStore();

      // Reset current session's flights but keep the session active
      state.flights = [];
      state.currentFlight = null;
      state.betweenActions = [];
      persistSession();
      render();
    }

    // ============================================================
    // INIT
    // ============================================================
    loadProfile();       // loads operator, equipment, location, vehicle
    loadVehicleCache();  // loads vehicle lookup cache
    loadStore();         // loads accumulated sessions awaiting download

    const today = new Date().toISOString().slice(0, 10);
    const lastDate = localStorage.getItem('fieldlogger_date');

    if (lastDate === today) {
      // Same day: restore everything including location and active session
      loadSessionCache();
    } else {
      // New day: rescue any unsaved flights from yesterday into the download queue
      loadSessionCache();
      if (state.session && state.flights.length > 0) {
        state.sessionStore.push({ session: { ...state.session }, flights: [...state.flights], vehicle: { ...state.vehicle } });
        persistStore();
      }
      // Reset session-specific state; keep operator/equipment
      state.location = "";
      state.session = null;
      state.flights = [];
      state.currentFlight = null;
      state.betweenActions = [];
      state.batteryUse = {
        currentLevel: null, levelSetAt: null, airborne: false,
        hasLanded: false, liftoffTime: null, liftoffLevel: null, lastFlight: null
      };
      clearSessionCache();
      localStorage.setItem('fieldlogger_date', today);
    }

    render();

    // Re-render every second when airborne (flight timer), every 30s otherwise (staleness check)
    let _tickCount = 0;
    setInterval(() => {
      if (!state.session?.measureBattery) return;
      _tickCount++;
      if (openModal === 'landing-battery') return; // don't reset the landing slider mid-entry
      if (state.batteryUse?.airborne || _tickCount % 30 === 0) render();
    }, 1000);
  </script>
</body>
